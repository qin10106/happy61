<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>六一儿童节快乐！Lyla</title>
    <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='88'>💖</text></svg>" />
    <link rel="stylesheet" href="style/index3.css" />
    <script src="script/index3.js"></script>
</head>

<body>
    <!-- 点击提示遮罩 -->
    <div class="hint">🎈 点击屏幕开始 🎈</div>

    <!-- 音量控制 -->
    <div id="volumeControl">
        <button id="volumeBtn">🔊</button>
        <input type="range" id="volumeSlider" min="0" max="100" value="60" />
    </div>

    <!-- 借鉴 love5：爱心祝福飞入层 -->
    <div id="starStage"></div>

    <!-- 借鉴 love1：心形文字层 -->
    <div id="heartStage"></div>

    <!-- 照片宝丽来散落层 -->
    <div id="photoGrid"></div>

    <!-- 幻灯片展示层 -->
    <div id="photoSlides"></div>

    <div class="container">
        <!-- 1. 打招呼 -->
        <div class="one">
            <h1 class="one">
                <span data-node-name="greeting">你好呀，</span>
                <span data-node-name="name">Lyla</span>
            </h1>
            <p class="two" data-node-name="greetingText">六一儿童节快乐！愿你童心永驻 ✨</p>
        </div>

        <!-- 2. 点题 -->
        <div class="three">
            <p data-node-name="text1">今天是属于你的节日呀！！！</p>
        </div>

        <!-- 3. 聊天气泡祝福 -->
        <div class="four">
            <div class="text-box">
                <p class="hbd-chatbox" data-node-name="textInChatBox">
                    愿你的每一天都像糖果一样甜，像彩虹一样绚烂！🍬🌈
                </p>
                <p class="fake-btn" data-node-name="sendButtonLabel">发送</p>
            </div>
        </div>

        <!-- 4. 层层铺垫 -->
        <div class="five">
            <p class="idea-1" data-node-name="text2">希望你在未来的每一天</p>
            <p class="idea-2" data-node-name="text3">都能保持</p>
            <p class="idea-3">
                <span data-node-name="text4">那份独一无二的</span>
                <strong data-node-name="text4Adjective">纯真与快乐</strong>
            </p>
            <p class="idea-4" data-node-name="text5Entry">因为———</p>
            <p class="idea-5">
                <span data-node-name="text5Content">你永远是那个最可爱的小朋友</span>
                <span class="smiley" data-node-name="smiley">:)</span>
            </p>
            <p class="idea-6">
                <span data-node-name="bigTextPart1">你具有很多</span>
                <span data-node-name="bigTextPart2">过人的品质</span>
            </p>
        </div>

        <!-- 5. 照片 + 祝福 -->
        <div class="six">
            <img src="img/avatar.jpg" class="lydia-dp" data-node-name="imagePath" style="border-radius: 50%" alt="照片" />
<div class="wish">
                <h3 class="wish-hbd" data-node-name="wishHeading">祝愿Lyla：</h3>
                <h5 data-node-name="wishText">
                    童心未泯，快乐加倍。眼中有光，心中有梦。六一快乐！🎈
                </h5>
            </div>
        </div>

        <!-- 6. 气球升起 -->
        <div class="seven">
            <div class="baloons">
                <img src="img/ballon2.svg" alt="" />
                <img src="img/ballon1.svg" alt="" />
                <img src="img/ballon3.svg" alt="" />
                <img src="img/ballon1.svg" alt="" />
                <img src="img/ballon2.svg" alt="" />
                <img src="img/ballon3.svg" alt="" />
                <img src="img/ballon2.svg" alt="" />
                <img src="img/ballon3.svg" alt="" />
                <img src="img/ballon1.svg" alt="" />
                <img src="img/ballon2.svg" alt="" />
                <img src="img/ballon3.svg" alt="" />
                <img src="img/ballon2.svg" alt="" />
                <img src="img/ballon1.svg" alt="" />
                <img src="img/ballon3.svg" alt="" />
                <img src="img/ballon2.svg" alt="" />
                <img src="img/ballon3.svg" alt="" />
                <img src="img/ballon1.svg" alt="" />
                <img src="img/ballon2.svg" alt="" />
                <img src="img/ballon1.svg" alt="" />
                <img src="img/ballon3.svg" alt="" />
                <img src="img/ballon3.svg" alt="" />
                <img src="img/ballon1.svg" alt="" />
                <img src="img/ballon2.svg" alt="" />
                <img src="img/ballon3.svg" alt="" />
                <img src="img/ballon2.svg" alt="" />
                <img src="img/ballon1.svg" alt="" />
                <img src="img/ballon3.svg" alt="" />
                <img src="img/ballon2.svg" alt="" />
                <img src="img/ballon3.svg" alt="" />
                <img src="img/ballon1.svg" alt="" />
                <img src="img/ballon2.svg" alt="" />
                <img src="img/ballon1.svg" alt="" />
                <img src="img/ballon3.svg" alt="" />
            </div>
        </div>

        <!-- 7. 圆形粒子飘散 -->
        <div class="eight">
            <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                <circle cx="20" cy="20" r="20" />
            </svg>
            <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                <circle cx="20" cy="20" r="20" />
            </svg>
            <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                <circle cx="20" cy="20" r="20" />
            </svg>
            <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                <circle cx="20" cy="20" r="20" />
            </svg>
            <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                <circle cx="20" cy="20" r="20" />
            </svg>
            <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                <circle cx="20" cy="20" r="20" />
            </svg>
            <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                <circle cx="20" cy="20" r="20" />
            </svg>
            <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                <circle cx="20" cy="20" r="20" />
            </svg>
            <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                <circle cx="20" cy="20" r="20" />
            </svg>
        </div>

        <!-- 8. 结尾 -->
        <div class="nine">
            <p data-node-name="outroText">
                愿你的世界永远五彩斑斓，永远充满欢笑！ヾ(≧▽≦)ゝ
            </p>
            <p id="replay" data-node-name="replayText">再 看 一 次</p>
            <p class="last-smile" data-node-name="outroSmiley">:)</p>
        </div>
    </div>

    <!-- 继续按钮（暂停时显示） -->
    <button id="continueBtn">▶ 继 续</button>
</body>

<script src="script/TweenMax.min.js"></script>

</html>
